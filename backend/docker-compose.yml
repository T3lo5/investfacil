version: '3.8'

services:
  backend:
    build: .
    container_name: investfacil-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - investfacil-network

networks:
  investfacil-network:
    driver: bridge
