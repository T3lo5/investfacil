version: '3.8'

services:
  investfacil-api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - BRAPI_TOKEN=${BRAPI_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - DB_PATH=/app/data/investfacil.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
